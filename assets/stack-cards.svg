<svg width="700" height="340" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card { opacity: 0; animation: fadeIn 0.6s ease forwards; }
    .card1 { animation-delay: 0.1s; }
    .card2 { animation-delay: 0.3s; }
    .card3 { animation-delay: 0.5s; }
    .card4 { animation-delay: 0.7s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .label { font-family: monospace; font-size: 16px; font-weight: bold; fill: #ffffff; }
    .tag { font-family: monospace; font-size: 13px; fill: #9ae6b4; }
  </style>

  <rect class="card card1" x="20" y="20" width="320" height="130" rx="12" fill="#0d1117" stroke="#1D9E75" stroke-width="1.5"/>
  <text class="card card1 label" x="40" y="52">Backend</text>
  <text class="card card1 tag" x="40" y="80">Node.js</text>
  <text class="card card1 tag" x="40" y="102">Express</text>
  <text class="card card1 tag" x="40" y="124">Redis</text>

  <rect class="card card2" x="360" y="20" width="320" height="130" rx="12" fill="#0d1117" stroke="#7F77DD" stroke-width="1.5"/>
  <text class="card card2 label" x="380" y="52">Frontend</text>
  <text class="card card2 tag" x="380" y="80">React</text>
  <text class="card card2 tag" x="380" y="102">Next.js</text>
  <text class="card card2 tag" x="380" y="124">Tailwind</text>

  <rect class="card card3" x="20" y="180" width="320" height="130" rx="12" fill="#0d1117" stroke="#D85A30" stroke-width="1.5"/>
  <text class="card card3 label" x="40" y="212">Databases</text>
  <text class="card card3 tag" x="40" y="240">PostgreSQL</text>
  <text class="card card3 tag" x="40" y="262">MongoDB</text>
  <text class="card card3 tag" x="40" y="284">Prisma</text>

  <rect class="card card4" x="360" y="180" width="320" height="130" rx="12" fill="#0d1117" stroke="#D4537E" stroke-width="1.5"/>
  <text class="card card4 label" x="380" y="212">DevOps</text>
  <text class="card card4 tag" x="380" y="240">Docker</text>
  <text class="card card4 tag" x="380" y="262">AWS</text>
  <text class="card card4 tag" x="380" y="284">Nginx</text>
</svg>
