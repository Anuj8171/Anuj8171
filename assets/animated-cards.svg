
<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card { opacity: 0; animation: fadeIn 0.6s ease forwards; }
    .card1 { animation-delay: 0.1s; }
    .card2 { animation-delay: 0.4s; }
    .card3 { animation-delay: 0.7s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .title { font-family: monospace; font-size: 15px; font-weight: bold; fill: #ffffff; }
    .sub { font-family: monospace; font-size: 12px; fill: #9ae6b4; }
  </style>

  <rect class="card card1" x="10" y="20" width="215" height="160" rx="12" fill="#0d1117" stroke="#1D9E75" stroke-width="1.5"/>
  <text class="card card1 title" x="30" y="55">NotifyHQ</text>
  <text class="card card1 sub" x="30" y="80">Node.js · Redis · BullMQ</text>
  <text class="card card1 sub" x="30" y="100">100 req/s rate limited</text>
  <text class="card card1 sub" x="30" y="120">26 integration tests</text>

  <rect class="card card2" x="242" y="20" width="215" height="160" rx="12" fill="#0d1117" stroke="#7F77DD" stroke-width="1.5"/>
  <text class="card card2 title" x="262" y="55">E2EE Chat App</text>
  <text class="card card2 sub" x="262" y="80">React · TweetNaCl</text>
  <text class="card card2 sub" x="262" y="100">10,000 req/sec</text>
  <text class="card card2 sub" x="262" y="120">sub-100ms delivery</text>

  <rect class="card card3" x="474" y="20" width="215" height="160" rx="12" fill="#0d1117" stroke="#D85A30" stroke-width="1.5"/>
  <text class="card card3 title" x="494" y="55">Sync Engine</text>
  <text class="card card3 sub" x="494" y="80">Python · PyAirtable</text>
  <text class="card card3 sub" x="494" y="100">500+ events/min</text>
  <text class="card card3 sub" x="494" y="120">zero data loss</text>
</svg>
